name: Repository Check

on:
  push:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check README
        run: test -f README.md

      - name: Check PDFs
        run: |
          test -f "Солнечные электростанции.pdf"
          test -f "Сонячні електростанції.pdf"

      - name: Check AI files
        run: |
          test -f AI_INDEX.md
          test -f llms.txt

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-labelledby="title desc">
  <title id="title">EFHC Solar Books Logo</title>
  <desc id="desc">EFHC logo for free solar power plant documentation.</desc>
  <rect width="800" height="240" rx="36" fill="#063c2d"/>
  <circle cx="118" cy="120" r="62" fill="#f4c430"/>
  <circle cx="118" cy="120" r="38" fill="none" stroke="#063c2d" stroke-width="10"/>
  <g stroke="#063c2d" stroke-width="8" stroke-linecap="round">
